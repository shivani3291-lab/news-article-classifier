name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Visit app and wake if asleep
        run: |
          python - <<'PY'
          from playwright.sync_api import sync_playwright

          URL = "https://news-article-classifier-eyd497t5avdhywvkmqbzu3.streamlit.app/"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(URL, wait_until="networkidle", timeout=60000)

              wake_button = page.get_by_role("button", name="Yes, get this app back up!")
              try:
                  wake_button.wait_for(timeout=5000)
                  print("App is asleep — clicking wake button")
                  wake_button.click()
                  page.wait_for_timeout(30000)
              except Exception:
                  print("App already awake")

              browser.close()
          PY

name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl -sS -L --fail --max-time 30 \
            -c cookies.txt -b cookies.txt \
            -o /dev/null -w "HTTP %{http_code}\n" \
            https://news-article-classifier-eyd497t5avdhywvkmqbzu3.streamlit.app/
